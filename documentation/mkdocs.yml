site_name: ThermalBits
site_description: Documentation for the ThermalBits Python library
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: cyan

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Internal Representation: guides/overview.md
      - DAG Visualization: guides/visualization.md
      - Apply Optimizations: guides/optimization.md
      - Shannon Entropy: guides/entropy.md
  - Tools:
      - run_tests.py: cli/run-tests.md
  - Reference:
      - Public API: api/thermalbits.md
